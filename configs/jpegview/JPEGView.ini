[JPEGView]
# Display
AutoZoomMode=2
ZoomMode=1
AutoContrastCorrection=0.0
AutoColorCorrection=0.0
LocalDensityCorrection=0.0
ContrastCorrectionAmount=0.5
ColorCorrectionAmount=0.5

# Window
ShowFullScreen=false
ShowFileName=false
ShowFileInfo=false
ShowNavPanel=true
NavPanelAlwaysVisible=false
ShowZoomNavigator=true
ShowHistogram=false

# Slideshow
SlideShowInterval=0
SlideShowLoop=true

# Behavior
OpenJPGFileWithoutDialog=true
OpenWebpFileWithoutDialog=true
OpenPNGFileWithoutDialog=true
OpenBMPFileWithoutDialog=true
OpenTIFFFileWithoutDialog=true
SkipFileOpenDialogOnStartup=false
ReloadWhenDisplayedImageChanged=true
AutoRotateEXIF=true
StoreToEXIFOrientationTag=false
DisplayFlagHint=false

# Navigation
WrapAroundFolder=true
SortedFileList=true
SortByDate=false
NavigateByExif=false

# Processing
UseEmbeddedColorProfiles=true
AutoContrastCorrectionFactor=0.5
HighQualityResampling=true
DefaultSharpen=0.0
DefaultColorSaturation=1.0
DefaultContrast=0.0
DefaultGamma=1.0

# Memory
MaxImageCacheSizeMB=256
NumberOfCoresToUse=0

# Misc
DefaultSaveFormat=jpg
DefaultSaveQuality=90
BackgroundColor=3030080
LandscapeModeScreenPercent=98
PortraitModeScreenPercent=98